# filters.yaml
# Philosophy:
# - Minimal hard filtering (only remove obvious junk)
# - Let scoring handle relevance
# - Wide score spread for meaningful ranking

# ------------------------------------------------------------------
# HARD FILTERS (keep VERY minimal)
# ------------------------------------------------------------------

# Only reject clearly irrelevant roles
hard_domain_exclude:
  - recruiter
  - recruiting
  - talent acquisition
  - hr
  - human resources
  - sales
  - account executive
  - business development
  - legal
  - counsel

# Optional: keep or remove depending on preference
# If kept, make it NON-strict in code (allow missing)
hard_location_include:
  - united states
  - usa
  - remote
  - india

# ------------------------------------------------------------------
# SCORING WEIGHTS
# ------------------------------------------------------------------

# Layer 1 — Role Relevance (PRIMARY SIGNAL)
# Big spread to separate strong vs weak matches
role_weights:
  quantitative analyst:   10
  quant researcher:       10
  data scientist:         9
  data analyst:           8
  financial analyst:      8
  risk analyst:           8
  research analyst:       8
  business analyst:       7
  investment analyst:     7
  portfolio analyst:      7
  pricing analyst:        6
  fp&a analyst:           7
  analytics:              5
  data:                   3

  # weaker/general terms
  analyst:                1
  research:               1

# Layer 2 — Seniority Penalties (instead of hard filtering)
seniority_penalties:
  senior:          -8
  sr:              -8
  lead:            -6
  manager:         -6
  director:        -9
  principal:       -8
  staff:           -7
  vice president:  -10
  vp:              -10
  head:            -8
  chief:           -10

# Layer 3 — Skill Alignment
skill_weights:
  python:           3
  sql:              3
  r:                2
  excel:            1

  # analytics / modeling
  modeling:         3
  modelling:        3
  forecasting:      3
  statistical:      3
  statistics:       3

  # finance-specific
  valuation:        3
  financial modeling: 4
  portfolio:        3
  risk:             3

  # data tools
  tableau:          2
  power bi:         2

  # advanced
  machine learning: 4
  data science:     4

# Layer 4 — Context Bonuses (ENTRY-LEVEL SIGNAL)
context_bonuses:
  new grad:          5
  entry level:       5
  entry-level:       5
  early career:      4
  recent graduate:   5
  graduate program:  4
  campus:            3

  0-1 years:         5
  0-2 years:         5
  1-2 years:         4

  junior:            3
  associate:         2
  intern:            3
  internship:        3

# Layer 5 — Negative Context (soft filters)
negative_context:
  contract:         -2
  temporary:        -2
  unpaid:           -5

# Layer 6 — Location Bonuses
location_bonuses:
  chicago:    3
  remote:     2
  new york:   2
  california: 1
  india:      1

# ------------------------------------------------------------------
# SCORE THRESHOLDS
# ------------------------------------------------------------------

thresholds:
  minimum:  4
  low:      6
  medium:   10
  high:     15